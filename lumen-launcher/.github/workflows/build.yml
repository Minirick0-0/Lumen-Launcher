name: Build

on:
  push:
    branches:
      - main
    paths:
      - "xmcl-runtime/**"
      - "xmcl-runtime-api/**"
      - "xmcl-keystone-ui/**"
      - "xmcl-electron-app/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Fix node-gyp and Python (Windows)
        if: runner.os == 'Windows'
        run: python3 -m pip install --break-system-packages --user packaging setuptools

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache/electron
            ${{ github.workspace }}/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Cache Vite deps
        uses: actions/cache@v4
        with:
          path: xmcl-keystone-ui/node_modules/.vite
          key: ${{ runner.os }}-vite-${{ hashFiles('pnpm-lock.yaml', 'xmcl-keystone-ui/vite.config.ts') }}

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Setup Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Build
        run: |
          pnpm run --prefix xmcl-keystone-ui build
          pnpm run --prefix xmcl-electron-app build
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          NODE_OPTIONS: --max-old-space-size=8192
          NODE_ENV: production

      - name: Upload Windows build
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: lumen-launcher-win-b${{ github.run_number }}
          path: xmcl-electron-app/build/output/win-unpacked/
          retention-days: 30

      - name: Upload Linux build
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: lumen-launcher-linux-b${{ github.run_number }}
          path: xmcl-electron-app/build/output/linux-unpacked/
          retention-days: 30
